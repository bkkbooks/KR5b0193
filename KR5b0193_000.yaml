front:
  text: 三儀同卷率一
  hash: sha256:cda8c9c19da33a4ce862bc8e94d3c86ed307e4be8e641d35ce2620539a6ae8db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0193_HFL_000-001a, image: hfl/0268/0268-004.png}
body:
  text: 玉籙資度宿啓儀玉籙資度解壇儀玉籙資度設醮儀玉籙資度宿啓儀法事如式各禮師存念如法請宣神呪東方九氣青天明星大神煥照東方洞映九門轉燭陽光掃穢除氛開明童子號曰玄卿備衛我軒上對帝君收魔束妖討捕𠒋羣奉承正道赤書玉文九天符命攝龍驛傳普天安鎮我得飛仙南方三氣丹天煥景流光熒星轉燭洞照太陽上有赤精合契虛皇開明靈童號曰華房總統火兵備守玉堂斬邪束妖翦截魔王北帝所承風火莫當流鈴交煥翊衛壇場正道流行敢有巴狂我享上功坐運魁罡億劫長存保天無疆西方七氣素天太白流精光耀金門洞照太冥中有素皇號曰帝靈保神安鎮衛我身形斷截邪源王道正明宮殿整肅三景齊并道合自然飛升紫庭靈寶符命普惠萬生元皇正氣來合我身功加一切天地咸寧北方五氣玄天元始徘徊辰星煥爛光曜太微黑靈尊神號曰層威統冠飛天仙裙羽衣備衛五門檢精捕非敢有干試豁落斬摧玉符所告神真八威邪門閉塞正道明開映照我身三光同輝策空駕浮舉形仙飛中央一氣黃天調理乾坤陶鎔隂陽總統玄真鎮星吐輝流煥九天開光童子號曰天璘元氣陽精焰上朱煙洞照天下及臣等身百邪摧落殺鬼萬千中山神呪普天使然五靈安鎮身飛上仙鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今宿啓告齊建壇蕆事謹奏為入意其諸情悃巳録告聞願得太上至真道氣靈寶慧光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某等今故燒香願以是香功德上願某靈鳯馭凌霄鸞軿泛景登神快樂證果逍遙普為皇帝陛下皇太子殿下藩屏王矦土地官長臣等三師五友異代學真谷隱巖樓門徒祭酒以至三軍萬姓天下人民動植飛潜無邊含識皈身皈神皈命太上十方靈寶自然至真無極大道特乞赦原臣等三業六根無邊罪犯得離三災五苦八難九厄之中身得道真歌詠太平同濟仁壽逍遙無為永與道合所啓玄感應聲上御至真無極道前知磬舉起敬贊唱十方禮足各長跪皈命懴悔臣法衆等志心皈身皈神皈命十方無極大道太上靈寶天尊恭望洪慈洞垂巨澤普降洪恩臣聞混元祖氣常清靜以為宗玉籙儀文匪齊盟而莫格將感通于上聖先蕩滌於纎瑕庶竭忱誠以資冥福猶慮臣等智淪象罔識染紛葩精氣神混合之真業山未破身心口流吹之妄定水俄波動積過尤無邊無量仰祈矜憫俯賜赦原使臣等奏對無魔存思合道㑹萬真於帝所集百福於齊壇某靈證果登福境以澄神家國承庥保瑶圖而永固臣法衆等志心稽首禮謝無上至真三寶知磬舉三啓頌三禮重稱法位具位臣姓某謹同誠上啓太上無極大道元始天尊太上道君大上老君昊天玉皇上帝紫微北極大帝紫微天皇大帝后土皇地祇東極青華大帝南極長生大帝無上玉帝玉虛上帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宮靈寶至真明皇道君十方巳得道大聖衆至真諸君丈人大慈大悲救苦真人救度真人大惠真人注生真人普救真人香林㑹中法解真人三十六部尊經玄中大法師三天大法師靈寶經籍度三師真君正一嗣系女三師真君三界官屬一切真靈臣等社櫟散材井梧弱質親承道紀慨入室之悠悠快覩玄樞斯面牆之鬱鬱莫撫煙霞於駒谷徒玩日月於雞窗教出始青惟抱宣符之切科尊太素懼貽布憲之嚴倘非誓地以立功曷克承天而𥙷過臣欽奉綸音崇修玉籙資薦某靈增崇天福按如詞旨備極精誠淬礪丹衷磨礱素悃遵紫陽金匱之祕依蒼極玉籙之玄門列十華壇周四界法天象地三乘羅鵷鷺之班呼隂召陽九奏降龍鸞之御藹飛煙於蘭鼎騰彩霧於芝篝旌葆翩翻幡花搖曵自某日為始謹依科範啓建玄壇恩惟三寶道師九幽教主垂慈鑒映省覽所陳敕勒三洞仙靈靈寶官屬青玄僚佐黃籙班聮監齊侍經衛壇護道社令工地應感靈祇協力同心掃妖氛於內外通誠逹信契影響於天人令臣等百體清明三關調泰凝真端息融妙氣於丹廬㑹道運神挹靈光於玄座羅敷洪澤資薦神靈庶齊福以周圎俾法輪而興轉明晨行道續更啓聞知磬舉智慧頌告符蕳存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來宿啓建壇之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前上願天鑒中心風清下土玉振金聲之合序瓊輪羽蓋之臨軒成就朝修旁流冥福十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前出堂頌玉籙資度宿啓儀

front:
  text: 三儀同卷率一
  hash: sha256:cda8c9c19da33a4ce862bc8e94d3c86ed307e4be8e641d35ce2620539a6ae8db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0193_SJB_000-090134c, image: sjb/09/090134c.png}
body:
  text: 玉籙資度宿啓儀玉籙資度解壇儀玉籙資度設醮儀玉籙資度宿啓儀法事如式各禮師存念如法請宣神呪東方九炁青天明星大神煥照東方洞映九門轉燭陽光掃穢除氛開明童子號曰玄卿備衛我軒上對帝君收魔束妖討捕𠒋羣奉承正道赤書玉文九天符命攝龍驛傳普天安鎭我得飛仙南方三炁丹天煥景流光熒星轉燭洞照太陽上有赤精合契虚皇開明靈童號曰華房總統火兵備守玉堂斬邪束妖翦截魔王北帝所承風火莫當流鈴交煥翊衞壇場正道流行敢有巴狂我享上功坐運魁罡億劫長存保天無疆西方七炁素天太白流精光耀金門洞照太冥中有素皇號曰帝靈保神安鎭衛我身形斷截邪源王道正明宮殿整肅三景齊并道合自然飛升紫庭靈寳符命普惠萬生元皇正炁來合我身功加一切天地咸寜北方五炁玄天元始徘徊辰星煥爛光曜太微黑靈尊神號曰層威統冠飛天仙裙羽衣備衛五門檢精捕非敢有干試豁落斬摧玉符所告神眞八威邪門閉塞正道明開映照我身三光同輝策空駕浮舉形仙飛中央一炁黄天調理乾坤陶鎔隂陽總統玄眞鎭星吐輝流煥九天開光童子號曰天璘元炁陽精燄上朱煙洞照天下及臣等身百邪摧落殺鬼萬千中山神呪普天使然五靈安鎭身飛上仙鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴装顯服冠帶垂纓關啓玄壇土地方域神眞臣今宿啓吿齋建壇蕆事謹奏爲入意其諸情悃巳録吿聞願得太上至眞道炁靈寳慧光下降流入臣等身中令臣所啓之誠速逹徑御至眞無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某等今故燒香願以是香功德上願某靈鳯馭凌霄鸞軿汎景登神快樂證果逍遥普爲皇帝陛下皇太子殿下藩屏王矦土地官長臣等三師五友異代學眞谷隱巖樓門徒祭酒以至三軍萬姓天下人民動植飛潜無邊含識皈身皈神皈命太上十方靈寳自然至眞無極大道特乞赦原臣等三業六根無邊罪犯得離三災五苦八難九戹之中身得道眞歌詠太平同濟仁壽逍遥無爲永與道合所啓玄感應聲上御至眞無極道前知磬舉起敬賛唱十方禮足各長跪皈命懴悔臣法衆等志心皈身皈神皈命十方無極大道太上靈寳天尊恭望洪慈洞垂巨澤普降洪恩臣聞混元祖炁常清靜以爲宗玉籙儀文匪齋盟而莫格將感通扵上聖先蕩滌於纎瑕庶竭忱誠以資冥福猶慮臣等智淪象罔識染紛葩精氣神混合之眞業山未破身心口流吹之妄定水俄波動積過尤無邊無量仰祈矜憫俯賜赦原使臣等奏對無魔存思合道㑹萬眞於帝所集百福於齋壇某靈證果登福境以澄神家國承庥保瑶圖而永固臣法衆等志心稽首禮謝無上至眞三寳知磬舉三啓頌三禮重稱法位具位臣姓某謹同誠上啓太上無極大道元始天尊太上道君大上老君昊天玉皇上帝紫微北極大帝紫微天皇大帝后土皇地祇東極青華大帝南極長生大帝無上玉帝玉虚上帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宮靈寳至眞明皇道君十方巳得道大聖衆至眞諸君丈人大慈大悲救苦眞人救度眞人大惠眞人注生眞人普救眞人香林㑹中法解眞人三十六部尊經玄中大法師三天大法師靈寳經籍度三師眞君正一嗣系女三師眞君三界官屬一切眞靈臣等社櫟散材井梧弱質親承道紀慨入室之悠悠快覩玄樞斯面牆之鬰鬰莫撫煙霞於駒谷徒玩日月於雞窓教出始青惟抱宣符之切科尊太素懼貽布憲之嚴倘非誓地以立功曷克承天而𥙷過臣欽奉綸音崇修玉籙資薦某靈增崇天福按如詞旨備極精誠淬礪丹衷磨礱素悃遵紫陽金匱之祕依蒼極玉籙之玄門列十華壇周四界法天象地三乘羅鵷鷺之班呼隂召陽九奏降龍鸞之御藹飛煙於蘭鼎騰彩霧於芝篝旌葆翩翻旛花揺曵自某日爲始謹依科範啓建玄壇恩惟三寳道師九幽教主垂慈鑒映省覽所陳敕勒三洞仙靈靈寳官屬青玄僚佐黄籙班聮監齋侍經衞壇護道社令工地應感靈祇恊力同心掃妖氛於内外通誠逹信契影響於天人令臣等百體清明三關調泰凝眞端息融妙炁於丹廬㑹道運神挹靈光於玄座羅敷洪澤資薦神靈庶齋福以周圎俾法輪而興轉明晨行道續更啓聞知磬舉智慧頌告符蕳存神焼香香官使者左右龍虎君侍香諸靈官當令臣向來宿啓建壇之所自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前上願天鑒中心風清下土玉振金聲之合序瓊輪羽蓋之臨軒成就朝修旁流冥福十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至眞無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前出堂頌玉籙資度宿啓儀
